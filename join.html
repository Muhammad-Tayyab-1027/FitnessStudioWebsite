<main>

<h2>Membership Registration</h2>

<p>Please complete the form below to become a member of FitLife Gym.</p>

<form action="confirmation.html" method="get">

<label for="name">Full Name:</label><br>
<input type="text" id="name" name="name" required><br><br>

<label for="email">Email Address:</label><br>
<input type="email" id="email" name="email" required><br><br>

<label for="phone">Phone Number:</label><br>
<input type="tel" id="phone" name="phone"><br><br>

<label for="membership">Membership Type:</label><br>
<select id="membership" name="membership">
<option value="monthly">Monthly</option>
<option value="quarterly">Quarterly</option>
<option value="yearly">Yearly</option>
</select>

<br><br>

<label>Preferred Class:</label><br>
<input type="radio" name="class" value="Yoga"> Yoga<br>
<input type="radio" name="class" value="Pilates"> Pilates<br>
<input type="radio" name="class" value="Spin Class"> Spin Class<br>
<input type="radio" name="class" value="Strength Training"> Strength Training<br>
<input type="radio" name="class" value="Zumba"> Zumba<br>

<label for="message">Message:</label><br>
<textarea id="message" name="message" rows="5"></textarea>

<br><br>

<input type="submit" value="Join Now">

</form>

</main>
